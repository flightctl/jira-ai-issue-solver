name: OSAC Bot Adoption Metrics

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:
    inputs:
      jira_projects:
        description: 'Comma-separated Jira project prefixes to include (empty = all)'
        required: false
        default: 'OSAC'
      cutoff_date:
        description: 'YYYY-MM-DD boundary between legacy and redesigned bot'
        required: false
        default: '2026-05-17'
      excluded_tickets:
        description: 'Comma-separated ticket keys to exclude'
        required: false
        default: ''

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts

      - name: Collect bot metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_AUTHOR: 'app/osac-jira-ai-issue-solver'
          TARGET_REPOS: 'osac-project/fulfillment-service,osac-project/osac-operator,osac-project/osac-aap,osac-project/osac-installer'
          JIRA_PROJECTS: ${{ inputs.jira_projects || 'OSAC' }}
          EXCLUDED_TICKETS: ${{ inputs.excluded_tickets || '' }}
          CUTOFF_DATE: ${{ inputs.cutoff_date || '2026-05-17' }}
        run: python3 .github/scripts/bot-metrics.py
