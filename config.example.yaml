# Server Configuration
server:
  port: 8080

# Logging Configuration
logging:
  level: info  # Options: debug, info, warn, error
  format: console  # Options: console, json

# Jira Configuration
jira:
  base_url: https://your-domain.atlassian.net
  username: your-email@example.com  # Jira Cloud email (used for Basic Auth)
  api_token: your-jira-api-token    # Jira Cloud API token (https://id.atlassian.com/manage-profile/security/api-tokens)
  interval_seconds: 300

  # Map Jira assignee email/username to GitHub username
  # Required when using GitHub App authentication
  # The bot will use the assignee's fork instead of its own fork
  # NOTE: Email addresses MUST be quoted to avoid YAML parsing errors
  assignee_to_github_username:
    "alice@yourcompany.com": alice
    "bob.smith@yourcompany.com": bob-github
    "charlie@yourcompany.com": charlie123

  # Project-specific configurations
  # Each project can have its own settings for components, status transitions, etc.
  projects:
    # Example project 1 - with git PR field
    - project_keys:
        - "PROJ1"
        - "PROJ2"
      git_pull_request_field_name: "Git Pull Request"  # Required for PR feedback processing - set to your custom field name for PR URL
      disable_error_comments: false

      # When true, the bot pushes to the assignee's fork and creates
      # cross-repo PRs. The assignee must have an entry in
      # jira.assignee_to_github_username. When false (default), the
      # bot pushes branches directly to the upstream repo.
      fork_mode: false

      # Optional failure-state labels. When set, Bug Buddy applies these
      # labels to tickets in the corresponding failure state. Empty or
      # omitted values disable the label. Labels are mutually exclusive.
      failure_labels:
        ci_failing: "jira-autofix-ci-failing"    # PR exists, CI checks failing
        rejected: "jira-autofix-rejected"        # PR closed without merge
        blocked: "jira-autofix-blocked"          # Bot cannot proceed
        fork_user_missing: "jira-autofix-fork-user-missing"  # Fork mode, assignee not in mapping

      # Optional lifecycle labels tracking ticket progression through
      # the autofix pipeline. Labels are mutually exclusive: setting one
      # removes the others. Empty or omitted values disable the label.
      lifecycle_labels:
        queued: "jira-autofix"                   # Set externally (e.g., triage bot); removed when review is set
        review: "jira-autofix-review"            # Applied when PR is created
        merged: "jira-autofix-merged"            # Applied when all PRs are merged

      # GitHub PR labels applied when the AI session reports a problem.
      # At most one is set on a PR at any time. Applied when code is
      # pushed; cleared when a subsequent push passes. Labels unchanged
      # when no code is pushed. Omit or leave empty to disable.
      pr_validation_labels:
        validation_failed: "ai-validation-failed"  # AI explicitly reported validation failure
        nonzero_exit: "ai-nonzero-exit"            # AI container exited with non-zero code

      # Status transitions can be configured per ticket type
      # All ticket types must be explicitly configured
      # IMPORTANT: Status names are case-sensitive and must match Jira exactly
      # (e.g., "In Progress" not "in progress")
      status_transitions:
        # Specific transitions for Bug tickets
        Bug:
          todo: "Open"
          in_progress: "In Progress"
          in_review: "Code Review"
          merged: "MODIFIED"           # Optional: transition when all PRs merge

        # Specific transitions for Story tickets
        Story:
          todo: "Backlog"
          in_progress: "Development"
          in_review: "Testing"

        # Specific transitions for Task tickets
        Task:
          todo: "To Do"
          in_progress: "In Progress"
          in_review: "Review"

      # Workspaces group one or more repositories into a working
      # environment for AI sessions. A single-repo project is just a
      # workspace with one entry — no special casing.
      workspaces:
        # Single-repo workspace: the common case
        backend:
          repos:
            - name: backend
              url: https://github.com/your-org/backend.git
              profile: go-dev
              # target_branch: main  # PR base branch (default: "main")
        frontend:
          repos:
            - name: frontend
              url: https://github.com/your-org/frontend.git
              profile: go-dev
        api:
          repos:
            - name: api
              url: https://github.com/your-org/api.git
              profile: go-dev
              target_branch: master  # older repos may use "master"

        # Multi-repo workspace: all repos cloned into subdirectories
        # of the workspace and mounted into a single container.
        # Requires a workspace-level container with all toolchains.
        # full-stack:
        #   container:
        #     image: "your-org/full-stack-dev:latest"
        #   repos:
        #     - name: backend
        #       url: https://github.com/your-org/backend.git
        #       profile: go-dev
        #     - name: frontend
        #       url: https://github.com/your-org/frontend.git
        #       profile: node-dev

        # Multi-repo workspace with a scaffold (root) repo:
        # The root_repo is cloned first as the workspace root, then
        # child repos are cloned as subdirectories inside it. The
        # scaffold provides context files (CLAUDE.md, AI skills) but
        # is never branched, committed to, or PR'd.
        # osac:
        #   root_repo: https://github.com/osac-project/osac-workspace
        #   container:
        #     image: "your-org/osac-dev:latest"
        #   repos:
        #     - name: fulfillment-service
        #       url: https://github.com/osac-project/fulfillment-service
        #       profile: go-dev
        #     - name: osac-operator
        #       url: https://github.com/osac-project/osac-operator
        #       profile: go-dev

      # Profiles bundle container, imports, instructions, and workflow
      # settings. Repos within workspaces reference profiles by name.
      # Multiple repos can reference the same profile to avoid
      # duplication. Operator-defined profile settings take precedence
      # over repo-level config (.ai-bot/container.json) on conflicts.
      profiles:
        # Profile for Go projects
        go-dev:
          container:
            image: "your-org/dev-environment:latest"
            resource_limits:
              memory: "8g"
              cpus: "4"
            env:
              CONTAINER_HOST: "unix:///run/podman/podman.sock"
            tmpfs:
              - "/tmp:size=4g"
            extra_mounts:
              - source: "/run/user/1000/podman/podman.sock"
                target: "/run/podman/podman.sock"
              - source: "/home/user/.cache/go-build"
                target: "/home/builder/.cache/go-build"

          # Auxiliary repositories to clone into the workspace before AI
          # execution. Useful for providing shared AI workflows, skills,
          # or guidelines without requiring each repo to declare imports.
          imports:
            - repo: https://github.com/your-org/ai-workflows
              path: .ai-workflows                # destination relative to workspace root
              ref: main                          # branch/tag/commit (optional)
              install: .ai-workflows/install.sh  # shell command to run inside container after cloning (optional)
              excludes:                          # output directories to exclude from commits (optional)
                - .artifacts/

          # Universal instructions for the AI agent. Appended to ALL
          # task types (new tickets AND feedback). Use for validation
          # commands and coding standards. Repo-level
          # .ai-bot/instructions.md takes precedence when the profile
          # instructions field is empty.
          instructions: |
            After making changes, validate with:
            - `make build`
            - `make test`
            - `make lint`

          # Workflow for new tickets only. Appended ONLY to new-ticket
          # task files — feedback tasks do not receive this. Use for
          # multi-phase workflows (diagnose → fix → test → review → document).
          # Profile field overrides repo-level .ai-bot/new-ticket-workflow.md
          # when set.
          # new_ticket_workflow: |
          #   Read and execute .ai-workflows/bugfix/skills/unattended.md
          #   with these settings:
          #     branch: stay on the current branch (already created by the orchestration system)
          #     lint_command: golangci-lint run --fix
          #   All artifact paths (.artifacts/bugfix/{issue}/) should use
          #   .ai-session/ instead. Write the PR description to .ai-session/pr.md.

          # Workflow for PR feedback only. Appended ONLY to feedback
          # task files — new-ticket tasks do not receive this. Use for
          # structured feedback handling with session context recovery
          # and artifact updates across review rounds.
          # Profile field overrides repo-level .ai-bot/feedback-workflow.md
          # when set.
          # feedback_workflow: |
          #   Read and execute .ai-workflows/bugfix/skills/feedback.md
          #   All artifact paths (.artifacts/bugfix/{issue}/) should use
          #   .ai-session/ instead.
          #   Review comments are already provided in the task above
          #   (use source 1: task file).

        # Profile for a different language/toolchain
        # rust-dev:
        #   container:
        #     image: "rust:1.78"
        #   instructions: |
        #     Run `cargo test` before committing.

      # Components map Jira component names to workspaces.
      # Component names are matched case-insensitively.
      components:
        frontend:
          workspace: frontend
        backend:
          workspace: backend
        api:
          workspace: api

    # Example project 2 - single-repo project with default_workspace
    # (no component mapping needed)
    - project_keys:
        - "PROJ3"
      # No git_pull_request_field_name specified - PR URLs will be looked for in comments
      disable_error_comments: true
      status_transitions:
        Bug:
          todo: "NEW"
          in_progress: "ASSIGNED"
          in_review: "POST"
      # default_workspace is used when tickets have no component or no
      # matching component. Projects with a single workspace can use
      # this instead of (or alongside) component mappings.
      default_workspace: main
      workspaces:
        main:
          repos:
            - name: mobile
              url: https://github.com/your-org/mobile.git
              profile: default
      profiles:
        default:
          container:
            image: "your-org/mobile-dev:latest"

# GitHub Configuration - GitHub App Authentication (Required)
github:
  # GitHub App credentials (REQUIRED)
  # Create a GitHub App at: https://github.com/settings/apps/new
  # See GITHUB_APP_ADMIN_SETUP.md for detailed setup instructions
  app_id: 123456  # Your GitHub App ID from https://github.com/settings/apps/YOUR-APP-NAME
  private_key_path: "/path/to/your-github-app-private-key.pem"  # Path to the .pem file downloaded when creating the app

  # Bot username (REQUIRED)
  # Use the GitHub App name WITHOUT [bot] suffix (e.g., "bugs-buddy-jira-ai-issue-solver")
  # The [bot] suffix is added automatically in email construction
  # Note: bot_email is automatically constructed from app_id and bot_username
  bot_username: your-github-app-name

  pr_label: ai-pr

  # Optional: Path to SSH private key for commit signing
  # ssh_key_path: "/path/to/ssh_signing_key"

  # Bot loop prevention settings
  max_thread_depth: 5  # Maximum depth of bot reply threads (prevents infinite loops)

  # List of known bot usernames (prevents bot-to-bot conversations)
  # Add any additional code review bots your team uses
  # NOTE: Do NOT include [bot] suffixes - they are automatically handled
  # (e.g., use "github-actions" not "github-actions[bot]")
  known_bot_usernames:
    - "github-actions"
    - "dependabot"
    - "renovate"
    - "coderabbitai"
    - "sourcery-ai"
    - "copilot"
    - "deepsource-io"
    - "codefactor-io"
    - "codeclimate"

  # List of usernames whose PR comments are completely ignored
  # Use for CI/build bots whose comments are not code review feedback
  # (e.g., packit build commands). Differs from known_bot_usernames:
  # ignored users' comments are completely skipped, while known bots'
  # comments are processed initially but loop prevention stops
  # bot-to-bot conversations.
  ignored_usernames:
    - "packit-as-a-service"

  # GitHub label that tells the bot to skip a PR entirely. When this
  # label is present on a PR, the bot will not process review comments,
  # CI failures, or merge conflicts for that PR. Removing the label
  # re-enables processing on the next scan cycle. Set to empty string
  # to disable.
  skip_pr_label: ai-bot-skip

  # Check run names to exclude from CI failure detection. Use for checks
  # that are flaky, informational, or not fixable by code changes.
  # Matched case-insensitively.
  ignored_check_names:
    # - "license/cla"
    # - "codecov/patch"

# AI Provider Selection (choose one: "claude" or "gemini")
ai_provider: claude

# Claude authentication — passed to the container as environment variables.
# Two modes are supported (mutually exclusive):
#
# Mode 1: Direct Anthropic API key
#   Get from https://console.anthropic.com/settings/keys
#
# Mode 2: Vertex AI (Claude on Google Cloud)
#   Uses a GCP service account for authentication. All three vertex_*
#   fields must be set together. The credentials file is mounted
#   read-only into the container.
#
# CLI-level settings (timeout, tool filtering, etc.) are configured per-repo
# via .ai-bot/config.yaml or container environment, not here.
claude:
  # Mode 1: Direct API key
  # api_key: "sk-ant-api03-..."

  # Mode 2: Vertex AI
  vertex_project_id: "your-gcp-project-id"
  vertex_region: "us-east5"
  vertex_credentials_file: "/path/to/gcp-sa-key.json"  # Host path — mounted into AI containers by the bot

  # Optional: Claude model override (e.g., "claude-sonnet-4-6").
  # Repo-level .ai-bot/config.yaml can further override this.
  # Empty means Claude Code's built-in default.
  # model: "claude-sonnet-4-6"

# Gemini configuration — passed to the container as environment variables.
gemini:
  api_key: "your-gemini-api-key-here"
  model: "gemini-2.5-pro"  # Optional: Gemini model to use. Repo-level .ai-bot/config.yaml can override.

  # Token pricing (USD per million tokens) for cost estimation.
  # Used to compute session cost from Gemini's token counts.
  # Defaults match gemini-2.5-flash rates; override to match your model.
  # input_price_per_mtok: 0.15
  # output_price_per_mtok: 0.60
  # cached_price_per_mtok: 0.0375

# Workspace Configuration
# Workspaces are ticket-scoped directories that persist across jobs.
# Each ticket gets its own workspace directory, enabling AI-generated
# artifacts (caches, build outputs) to survive between sessions.
workspaces:
  # Root directory for per-ticket workspaces. Each ticket gets a
  # subdirectory named after its key (e.g., /var/lib/ai-bot/workspaces/PROJ-123/).
  base_dir: /var/lib/ai-bot/workspaces

  # Maximum age (in days) before a workspace is eligible for cleanup,
  # regardless of ticket status. Set high enough to cover typical PR
  # review turnaround times. If a workspace is cleaned up while its
  # ticket still has an active PR, the feedback pipeline will re-clone
  # automatically (but AI-generated artifacts from prior sessions will
  # be lost).
  ttl_days: 7

# Container Configuration
# AI sessions run inside ephemeral dev containers with full toolchain access.
# The bot manages container lifecycle; the AI manages thinking.
#
# Container settings are resolved from multiple sources in priority order:
#   1. Profile container settings (operator-defined, highest priority)
#   2. .ai-bot/container.json in the target repo
#   3. .devcontainer/devcontainer.json in the target repo
#
# Every component must have a container image configured via its profile
# or repo-level config. There is no global fallback image.
container:
  # Container runtime preference: "auto" (detect, preferring podman),
  # "podman", or "docker".
  runtime: auto

  # Host-level policy: applied to ALL spawned containers regardless
  # of the resolution chain above.

  # Disable SELinux confinement for spawned AI containers. Required
  # when the host uses SELinux and containers need access to shared
  # volumes or sockets without relabeling.
  # disable_selinux: true

  # User namespace mode for spawned containers. Common values:
  #   "keep-id"                      - map host UID into container
  #   "keep-id:uid=1000,gid=1000"    - map to specific UID/GID
  # userns: "keep-id:uid=1000,gid=1000"

# Guardrails Configuration
# Safety and resource limits to prevent runaway costs and cascading failures.
guardrails:
  # Maximum number of jobs that can run simultaneously.
  max_concurrent_jobs: 10

  # Maximum number of times a ticket can fail before further submissions
  # are rejected. Zero means no retries (one attempt total).
  max_retries: 3

  # Maximum daily AI session cost in USD. Job creation is paused when
  # this budget is exceeded. The budget resets at midnight UTC.
  # Zero or negative disables cost-based limiting.
  max_daily_cost_usd: 50.0

  # Maximum per-ticket AI session cost in USD. No new AI sessions start
  # for a ticket once its cumulative cost reaches or exceeds this value.
  # The cost file lives in the workspace, so it shares the workspace TTL
  # lifecycle. Can be overridden per-project via max_ticket_cost_usd on
  # the project config. Zero or negative disables per-ticket cost capping.
  max_ticket_cost_usd: 20.0

  # Maximum duration (in minutes) for an AI session inside a container.
  # Zero means no timeout.
  max_container_runtime_minutes: 60

  # Circuit breaker: trips after N consecutive failures within the
  # time window, pausing all job creation until the cooldown expires.
  # Set threshold to zero to disable the circuit breaker.
  circuit_breaker_threshold: 5
  circuit_breaker_window_minutes: 10
  circuit_breaker_cooldown_minutes: 5

  # Maximum number of times the bot will attempt to fix CI failures on a
  # single PR. Set to 0 to disable CI failure detection entirely.
  # Set to -1 for unlimited attempts.
  max_ci_fix_attempts: 3

  # Jira label that users can add to a ticket to trigger a retry after
  # the bot has exhausted its retry limit. The scanner detects the label,
  # resets the retry count, removes the label, and resubmits the ticket.
  # Set to empty string to disable the feature.
  retry_label: "ai-retry"

  # Minimum character length for Jira ticket comments to be included
  # in AI task files. Comments shorter than this are filtered as noise.
  # Set to 0 to include all non-empty comments.
  min_comment_length: 20

  # Maximum number of files allowed in a single commit created via
  # the GitHub API. Prevents the bot from pushing oversized commits
  # when the AI modifies more files than intended. Set to 0 to
  # disable (a hard-coded 1000-file safety cap still applies).
  max_commit_files: 100
